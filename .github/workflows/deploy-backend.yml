name: Deploy Backend to Tencent Cloud

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'scripts/deploy-backend.sh'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            export APP_ROOT="${{ secrets.APP_ROOT || '/srv/lab-miniapp-mvp' }}"
            export DEPLOY_BRANCH="${{ github.ref_name }}"
            export PM2_APP_NAME="lab-miniapp-backend"
            bash "$APP_ROOT/scripts/deploy-backend.sh"
