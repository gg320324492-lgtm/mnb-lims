name: Deploy Backend to Aliyun ECS

on:
  push:
    branches:
      - main
      - staging
    paths:
      - 'backend/**'
      - 'scripts/deploy-backend.sh'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      deploy_env:
        description: '部署环境（staging / production）'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      source_ref:
        description: '部署代码来源分支/Tag/Commit（默认 main）'
        required: true
        default: 'main'
        type: string

jobs:
  quality_gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Lint
        run: npm run lint

      - name: Syntax check
        run: npm run check:syntax

      - name: Basic API smoke test
        run: npm run test:smoke

      - name: Key flow e2e (admin + h5 api)
        run: npm run test:e2e

      - name: Browser e2e (admin + h5 pages)
        run: npm run test:e2e:browser

  mysql_regression:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: lab_miniapp
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      USE_MYSQL: 'true'
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: lab_miniapp
      AUTH_ALLOW_USER_ID_LOGIN: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Wait and run MySQL migrations
        shell: bash
        run: |
          set -e
          for i in $(seq 1 12); do
            npm run db:migrate && exit 0
            echo "[mysql-regression] wait mysql and retry ($i/12)..."
            sleep 5
          done
          echo "[mysql-regression] migration failed after retries"
          exit 1

      - name: MySQL smoke test
        run: npm run test:smoke

      - name: MySQL api e2e test
        run: npm run test:e2e

  deploy:
    runs-on: ubuntu-latest
    needs: [quality_gate, mysql_regression]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.ref_name }}

      - name: Resolve deploy mapping
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DEPLOY_ENV="${{ inputs.deploy_env }}"
            DEPLOY_BRANCH="${{ inputs.source_ref }}"
          else
            if [ "${{ github.ref_name }}" = "main" ]; then
              DEPLOY_ENV="production"
            elif [ "${{ github.ref_name }}" = "staging" ]; then
              DEPLOY_ENV="staging"
            else
              echo "Unsupported branch: ${{ github.ref_name }}"
              exit 1
            fi
            DEPLOY_BRANCH="${{ github.ref_name }}"
          fi

          echo "deploy_env=$DEPLOY_ENV" >> "$GITHUB_OUTPUT"
          echo "deploy_branch=$DEPLOY_BRANCH" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ steps.vars.outputs.deploy_env == 'production' && secrets.SSH_HOST_PRODUCTION || secrets.SSH_HOST_STAGING }}
          username: ${{ steps.vars.outputs.deploy_env == 'production' && secrets.SSH_USER_PRODUCTION || secrets.SSH_USER_STAGING }}
          key: ${{ steps.vars.outputs.deploy_env == 'production' && secrets.SSH_PRIVATE_KEY_PRODUCTION || secrets.SSH_PRIVATE_KEY_STAGING }}
          port: ${{ steps.vars.outputs.deploy_env == 'production' && secrets.SSH_PORT_PRODUCTION || secrets.SSH_PORT_STAGING || '22' }}
          script: |
            set -e
            if [ "${{ steps.vars.outputs.deploy_env }}" = "production" ]; then
              export DEPLOY_ENV="production"
              export APP_ROOT="${{ secrets.APP_ROOT_PRODUCTION || '/srv/lab-miniapp-mvp' }}"
              export PM2_APP_NAME="${{ secrets.PM2_APP_NAME_PRODUCTION || 'lab-miniapp-backend-production' }}"
            else
              export DEPLOY_ENV="staging"
              export APP_ROOT="${{ secrets.APP_ROOT_STAGING || '/srv/lab-miniapp-mvp-staging' }}"
              export PM2_APP_NAME="${{ secrets.PM2_APP_NAME_STAGING || 'lab-miniapp-backend-staging' }}"
            fi
            export DEPLOY_BRANCH="${{ steps.vars.outputs.deploy_branch }}"
            bash "$APP_ROOT/scripts/deploy-backend.sh"
