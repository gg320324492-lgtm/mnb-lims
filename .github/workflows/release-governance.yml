name: Release Governance

on:
  workflow_dispatch:
    inputs:
      release_env:
        description: '发布环境（staging / production）'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      target_ref:
        description: '发布引用（branch/tag/commit），默认当前分支'
        required: false
        default: ''
        type: string
      release_tag:
        description: '发布标签（可选，留空则自动生成）'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  release_notes:
    runs-on: ubuntu-latest
    outputs:
      notes: ${{ steps.notes.outputs.release_notes }}
      tag: ${{ steps.tag.outputs.tag }}
      ref: ${{ steps.tag.outputs.ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.target_ref != '' && inputs.target_ref || github.ref_name }}

      - name: Resolve tag and ref
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          REF="${{ inputs.target_ref != '' && inputs.target_ref || github.ref_name }}"
          TAG_INPUT="${{ inputs.release_tag }}"

          if [ -n "$TAG_INPUT" ]; then
            TAG="$TAG_INPUT"
          else
            SHORT_SHA="$(git rev-parse --short HEAD)"
            TS="$(date -u +'%Y.%m.%d-%H%M')"
            TAG="release-${{ inputs.release_env }}-${TS}-${SHORT_SHA}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          bash scripts/generate-release-notes.sh > release-notes.md
          {
            echo "release_notes<<__NOTES__"
            cat release-notes.md
            echo "__NOTES__"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists on target commit
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "[release] tag exists: $TAG"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "[release] created and pushed tag: $TAG"
          fi

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  create_release:
    runs-on: ubuntu-latest
    needs: release_notes

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release_notes.outputs.ref }}

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release_notes.outputs.tag }}
          target_commitish: ${{ needs.release_notes.outputs.ref }}
          body_path: release-notes.md
          files: |
            release-notes.md

  release_summary:
    runs-on: ubuntu-latest
    needs: release_notes

    steps:
      - name: Build release summary
        run: |
          {
            echo "# Release Governance Summary"
            echo ""
            echo "- Env: ${{ inputs.release_env }}"
            echo "- Ref: ${{ needs.release_notes.outputs.ref }}"
            echo "- Tag: ${{ needs.release_notes.outputs.tag }}"
            echo ""
            echo "${{ needs.release_notes.outputs.notes }}"
          } >> "$GITHUB_STEP_SUMMARY"
